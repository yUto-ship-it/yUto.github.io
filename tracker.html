    <script>
        // ---------- STORAGE ----------
        const STORAGE_KEY = "Zawgyi_Modern_Expense";
        let transactions = [];  // each: { id, type, amount, description, category, date }

        // current filter
        let currentFilter = "all";

        // ---------- helper ----------
        function loadData() {
            const stored = localStorage.getItem(STORAGE_KEY);
            if (stored) {
                try {
                    transactions = JSON.parse(stored);
                    if (!Array.isArray(transactions)) transactions = [];
                    // ensure each has date
                    transactions.forEach(t => { if (!t.date) t.date = new Date().toISOString(); });
                } catch (e) { transactions = []; }
            }
            if (transactions.length === 0) {
                // add sample modern transactions
                transactions = [
                    { id: Date.now() + 101, type: "income", amount: 650000, description: "လစာ (ဇန်နဝါရီ)", category: "ဝင်ငွေ", date: new Date().toISOString() },
                    { id: Date.now() + 102, type: "expense", amount: 45000, description: "ဈေးဝယ်", category: "ဈေးဝယ်", date: new Date(Date.now() - 86400000).toISOString() },
                    { id: Date.now() + 103, type: "expense", amount: 12000, description: "ထမင်းစား", category: "စားသောက်ရေး", date: new Date(Date.now() - 172800000).toISOString() },
                ];
                saveToLocal();
            }
        }

        function saveToLocal() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(transactions));
        }

        // update stats and re-render
        function updateUI() {
            let totalIncome = 0, totalExpense = 0;
            transactions.forEach(t => {
                if (t.type === "income") totalIncome += t.amount;
                else totalExpense += t.amount;
            });
            const balance = totalIncome - totalExpense;
            document.getElementById("balanceTotal").innerText = balance.toLocaleString('en-US');
            document.getElementById("totalIncome").innerText = totalIncome.toLocaleString('en-US');
            document.getElementById("totalExpense").innerText = totalExpense.toLocaleString('en-US');

            renderTransactionList();
        }

        function renderTransactionList() {
            const container = document.getElementById("txListContainer");
            let filtered = [...transactions];
            if (currentFilter === "expense") filtered = filtered.filter(t => t.type === "expense");
            if (currentFilter === "income") filtered = filtered.filter(t => t.type === "income");

            filtered.sort((a, b) => new Date(b.date) - new Date(a.date));

            if (filtered.length === 0) {
                container.innerHTML = `<div class="empty-list"><i class="fas fa-receipt"></i> မှတ်တမ်းမရှိသေးပါ။ အသစ်ထည့်ပါ။</div>`;
                return;
            }

            let html = "";
            for (let tx of filtered) {
                const amountStr = tx.amount.toLocaleString('en-US');
                const sign = tx.type === "expense" ? "- " : "+ ";
                const amountClass = tx.type === "expense" ? "expense" : "income";
                const formattedDate = new Date(tx.date).toLocaleString('my-MM', { day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' });
                html += `
                <div class="tx-item" data-id="${tx.id}">
                    <div class="tx-left">
                        <div class="tx-title">
                            <span>${escapeHtml(tx.description)}</span>
                        </div>
                        <div class="tx-category">${escapeHtml(tx.category)}</div>
                        <div class="tx-date"><i class="far fa-calendar-alt"></i> ${formattedDate}</div>
                    </div>
                    <div class="tx-right">
                        <div class="tx-amount ${amountClass}">${sign}${amountStr} ကျပ်</div>
                        <button class="delete-icon" data-id="${tx.id}"><i class="fas fa-trash-can"></i></button>
                    </div>
                </div>
            `;
            }
            container.innerHTML = html;
            // attach delete events
            document.querySelectorAll('.delete-icon').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const id = parseInt(btn.getAttribute('data-id'));
                    deleteTransactionById(id);
                });
            });
        }

        function deleteTransactionById(id) {
            transactions = transactions.filter(t => t.id !== id);
            saveToLocal();
            updateUI();
        }

        function addNewTransaction() {
            const type = document.getElementById("txType").value;
            let amount = parseFloat(document.getElementById("txAmount").value);
            const description = document.getElementById("txDesc").value.trim();
            let category = document.getElementById("txCategory").value;

            if (!description) {
                alert("ကျေးဇူးပြု၍ ဖော်ပြချက် ထည့်ပါ။");
                return false;
            }
            if (isNaN(amount) || amount <= 0) {
                alert("မှန်ကန်သောငွေပမာဏ ထည့်ပါ။");
                return false;
            }
            if (type === "expense" && category === "ဝင်ငွေ") category = "အခြား";
            if (type === "income" && !category.includes("ဝင်ငွေ") && category !== "ဝင်ငွေ") {
                // allow but keep user choice, fine
            }

            const newTx = {
                id: Date.now(),
                type: type,
                amount: amount,
                description: description,
                category: category,
                date: new Date().toISOString()
            };
            transactions.push(newTx);
            saveToLocal();
            // clear fields
            document.getElementById("txAmount").value = "";
            document.getElementById("txDesc").value = "";
            document.getElementById("txAmount").focus();
            updateUI();
            return true;
        }

        function resetAllData() {
            if (confirm("သေချာပါသလား။ မှတ်တမ်းအားလုံး ဖျက်ပစ်မှာဖြစ်ပါတယ်။")) {
                transactions = [];
                saveToLocal();
                updateUI();
            }
        }

                            <td style="padding:8px;">${new Date(t.date).toLocaleDateString('my-MM')}</td>

                    `).join('')}
                </tbody>
            </table>
            <footer style="margin-top:32px; text-align:center; font-size:10px; color:#6c86a3;">Zawgyi Tracker မှ ထုတ်ယူသည် - ခေတ်မီငွေစာရင်း</footer>
        `;

            const opt = {
                margin: [0.5, 0.5, 0.5, 0.5],
                filename: `Expense_Report_${new Date().toISOString().slice(0, 19)}.pdf`,
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2, letterRendering: true },
                jsPDF: { unit: 'in', format: 'a4', orientation: 'portrait' }
            };
            html2pdf().set(opt).from(pdfContent).save();
        }

        function escapeHtml(str) {
            if (!str) return "";
            return str.replace(/[&<>]/g, function (m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        // filter chips event
        function initFilters() {
            const chips = document.querySelectorAll('.chip');
            chips.forEach(chip => {
                chip.addEventListener('click', () => {
                    const filterVal = chip.getAttribute('data-filter');
                    currentFilter = filterVal;
                    chips.forEach(c => c.classList.remove('active'));
                    chip.classList.add('active');
                    updateUI();
                });
            });
        }

        // startup
        function init() {
            loadData();
            initFilters();
            updateUI();
            document.getElementById("addTxBtn").addEventListener("click", addNewTransaction);
            document.getElementById("resetDemoBtn").addEventListener("click", resetAllData);
            document.getElementById("exportPDFbtn").addEventListener("click", exportToPDF);
        }
        init();
    </script>
</body>

</html>
